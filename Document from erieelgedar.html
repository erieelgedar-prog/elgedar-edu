<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>elgedar الجعدار</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #0e1621; --card: #17212b; --blue: #2481cc; }
        body { background: var(--dark); color: white; font-family: 'Cairo', sans-serif; padding: 10px; overflow-x: hidden; }
        .gedar-card { background: var(--card); border: 2px solid var(--gold); border-radius: 15px; padding: 15px; margin-bottom: 15px; position: relative; }
        .btn-gedar { background: linear-gradient(45deg, #c5a059, #8e6d2a); color: black; font-weight: 900; border: none; border-radius: 10px; padding: 12px; width: 100%; cursor: pointer; text-align: center; display: block; text-decoration: none; }
        input, textarea, select { background: #0e1621 !important; color: white !important; border: 1px solid #3d4b59 !important; border-radius: 8px !important; padding: 10px !important; width: 100%; margin-bottom: 10px; }
        .nav-btn { background: #242f3d; color: white; border: 1px solid #3d4b59; border-radius: 8px; padding: 8px 15px; white-space: nowrap; font-size: 0.85rem; cursor: pointer; }
        .nav-btn.active { background: var(--blue); border-color: var(--blue); }
        .admin-sec { display: none; } .admin-sec.active { display: block; }
        #exam-container { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--dark); z-index:9999; }
        .preview-box { background: #1c2733; border: 1px dashed var(--gold); padding: 10px; border-radius: 10px; margin-top: 10px; display:none; }
        .btn-xs { padding: 1px 5px; font-size: 0.75rem; }
        .paste-btn { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); background: #242f3d; border: 1px solid #c5a059; color: #c5a059; border-radius: 5px; padding: 2px 8px; cursor: pointer; font-size: 0.75rem; z-index: 100; }
        .item-accordion { border: 1px solid #3d4b59; border-radius: 8px; overflow: hidden; margin-bottom: 8px; }
        .item-accordion-header { padding: 10px; background: #242f3d; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .item-accordion-body { display: none; padding: 10px; background: #17212b; border-top: 1px solid #3d4b59; }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="exam-container">
    <div style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:10000;"></div>
    <button class="btn btn-danger m-2" style="position:relative; z-index:10001;" onclick="closeExam()">إغلاق الامتحان ✖</button>
    <iframe id="exam-frame" src="" style="width:100%; height:90vh; border:none;"></iframe>
</div>

<div class="container" style="max-width: 1100px;">
    <div class="gedar-card d-flex align-items-center justify-content-between py-2">
        <h4 class="m-0 text-warning fw-bold">elgedar الجعدار</h4>
        <div>
            <button id="to-admin-btn" class="btn btn-sm btn-outline-warning" style="display:none" onclick="toggleView('admin-ui')">⚙️ الإدارة</button>
            <button id="to-stu-btn" class="btn btn-sm btn-outline-info" style="display:none" onclick="toggleView('student-ui')">👤 الطالب</button>
        </div>
    </div>

    <div id="login-ui">
        <div class="gedar-card text-center mt-5">
            <h3 class="text-warning mb-4">🦁 دخول العرين</h3>
            <div style="position: relative; max-width: 400px; margin: auto;">
                <span class="paste-btn" onclick="doPaste('pass-field')">📋 لصق</span>
                <input type="password" id="pass-field" class="text-center fs-4" placeholder="كود الطالب أو الباسورد" style="padding-left: 75px !important;">
            </div>
            <button class="btn-gedar fs-5 mt-3" onclick="handleLogin()">دخول الآن</button>
        </div>
    </div>

    <div id="admin-ui" style="display:none">
        <div class="d-flex gap-2 overflow-auto mb-3 pb-2 border-bottom border-secondary">
            <button class="nav-btn active" onclick="showAdminSec('post', this)">📤 نشر</button>
            <button class="nav-btn" onclick="showAdminSec('codes', this)">🔑 الأكواد</button>
            <button class="nav-btn" onclick="showAdminSec('settings', this)">🛠️ الضبط</button>
        </div>

        <div id="sec-post" class="admin-sec active gedar-card">
            <div class="row g-2">
                <div class="col-4"><select id="sub-list" onchange="syncUnits()"></select></div>
                <div class="col-4"><select id="u-list"></select></div>
                <div class="col-4">
                    <select id="t-list">
                        <option value="vid">🎥 فيديو</option>
                        <option value="gram-sh">⚖️ شرح جرامر</option>
                        <option value="gram-q">❓ أسئلة جرامر</option>
                        <option value="voc-sh">📝 كلمات</option>
                        <option value="voc-q">✏️ أسئلة كلمات</option>
                        <option value="story-sh">📖 القصة</option>
                        <option value="story-q">🏹 أسئلة قصة</option>
                        <option value="mix-q">🌀 ميكس شامل</option>
                        <option value="exams">🏁 امتحان (محمي)</option>
                        <option value="interactive">📝 اختبار تفاعلي</option>
                        <option value="files">📁 ملفات</option>
                    </select>
                </div>
            </div>
            <textarea id="data-input" rows="4" placeholder="اكتب النص أو كود الاختبار هنا..."></textarea>
            <div class="row g-2">
                <div class="col-8">
                    <div style="position:relative">
                        <span class="paste-btn" onclick="doPaste('l-url')">📋 لصق</span>
                        <input type="text" id="l-url" placeholder="الرابط" style="padding-left: 75px !important;">
                    </div>
                </div>
                <div class="col-4"><input type="text" id="l-title" placeholder="اسم الزرار"></div>
            </div>
            <div class="d-flex gap-2 mt-2">
                <button class="btn btn-outline-info flex-grow-1" onclick="previewContent()">👁️ معاينة</button>
                <button class="btn-gedar flex-grow-1" style="padding:5px" onclick="publishContent()">🚀 نشر الآن</button>
            </div>
            <div id="preview-area" class="preview-box"><div id="preview-content"></div></div>
            
            <hr>
            <div class="d-flex justify-content-between align-items-center mb-2">
                <h6 class="m-0 text-warning fw-bold">📝 مقص الإدارة المطور</h6>
                <button class="btn btn-xs btn-outline-warning" onclick="window.sortDesc = !window.sortDesc; renderAdminItems()">
                    <span id="sort-icon">🔽 الأحدث</span>
                </button>
            </div>

            <div id="admin-sub-tabs" class="d-flex gap-1 overflow-auto mb-2 pb-1" style="border-bottom: 1px solid #3d4b59;"></div>

            <div id="admin-items-list"></div>
        </div>

        <div id="sec-codes" class="admin-sec gedar-card">
            <div id="code-stats" class="row mb-3 text-center g-2 small"></div>
            <div class="d-flex gap-2">
                <select id="code-sub-picker" class="m-0"></select>
                <input type="number" id="c-num" placeholder="العدد" class="m-0" style="width:80px">
                <button class="btn btn-warning" onclick="generateCodes()">توليد</button>
                <button class="btn btn-outline-danger" onclick="clearUsedCodes()">🧹 تنظيف المستخدم</button>
            </div>
            <div class="mt-3" style="max-height:400px; overflow-y:auto;">
                <table class="table table-dark table-striped small align-middle">
                  <thead>
                    <tr>
                        <th>الكود</th>
                        <th>نسخ</th>
                        <th>المادة</th>
                        <th>تاريخ الدخول</th> 
                        <th>الجهاز</th>
                        <th>تحكم</th>
                    </tr>
                </thead>
                <tbody id="codes-tbody"></tbody>
                </table>
            </div>
        </div>

        <div id="sec-settings" class="admin-sec gedar-card">
            <h6>📂 إدارة المواد</h6>
            <div class="d-flex gap-2 mb-3">
                <input type="text" id="new-sub-name" placeholder="مادة جديدة" class="m-0">
                <button class="btn btn-primary" onclick="addSubject()">إضافة</button>
            </div>
            <div id="subjects-manage-list"></div>
            <hr>
            <h6>📂 الأقسام والوحدات</h6>
            <select id="sub-picker" onchange="renderUnitManager()"></select>
            <div class="d-flex gap-2">
                <input type="text" id="new-u-name" placeholder="اسم القسم" class="m-0">
                <button class="btn btn-success" onclick="addUnit()">إضافة</button>
            </div>
            <div id="unit-manager-list" class="mt-2"></div> 
            <hr>
            <h6>🔐 أمان الحساب</h6>
            <div class="d-flex gap-2">
                <input type="text" id="new-admin-pass" placeholder="الباسورد الجديد للإدارة" class="m-0">
                <button class="btn btn-danger" onclick="updateAdminPass()">تغيير</button>
            </div>
        </div>
    </div>

    <div id="student-ui" style="display:none">
        <div class="gedar-card text-center py-2"><h5 class="m-0">📚 مادة: <span id="stu-sub-name"></span></h5></div>
        <div id="stu-tabs" class="d-flex gap-2 overflow-auto mb-3 pb-2 border-bottom border-secondary">
            <button class="nav-btn active" onclick="setStuTab('vid', this)">🎥 فيديو</button>
            <button class="nav-btn" onclick="setStuTab('gram-sh', this)">⚖️ شرح جرامر</button>
            <button class="nav-btn" onclick="setStuTab('gram-q', this)">❓ أسئلة جرامر</button>
            <button class="nav-btn" onclick="setStuTab('voc-sh', this)">📝 كلمات</button>
            <button class="nav-btn" onclick="setStuTab('voc-q', this)">✏️ أسئلة كلمات</button>
            <button class="nav-btn" onclick="setStuTab('story-sh', this)">📖 قصة</button>
            <button class="nav-btn" onclick="setStuTab('story-q', this)">🏹 أسئلة قصة</button>
            <button class="nav-btn" onclick="setStuTab('mix-q', this)">🌀 ميكس شامل</button>
            <button class="nav-btn" onclick="setStuTab('exams', this)">🏁 امتحان</button>
            <button class="nav-btn" onclick="setStuTab('interactive', this)">📝 اختبار</button>
            <button class="nav-btn" onclick="setStuTab('files', this)">📁 ملفات</button>
        </div>
        <div id="stu-u-nav" class="d-flex gap-2 overflow-auto mb-3"></div>
        <div id="stu-main"></div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://elgedarplatformedu-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const PATH = 'gedar_final_v14';

    // متغيرات الحالة العالمية
    window.sortDesc = true;
    window.adminSelSub = "";

    db.ref(PATH).on('value', snap => {
        const v = snap.val() || {};
        window.APP = {
            subs: v.subjects || ["الإنجليزي"],
            units: v.units || {"الإنجليزي":["عام"]},
            content: Array.isArray(v.content) ? v.content : Object.values(v.content || {}),
            codes: v.codes || {},
            pass: v.adminPass || "hisham011%radwa"
        };
        renderAll();
    });

    function renderAll() {
        const opts = APP.subs.map(x => `<option value="${x}">${x}</option>`).join("");
        ['sub-list','sub-picker','code-sub-picker'].forEach(id => { 
            if(document.getElementById(id)) document.getElementById(id).innerHTML = opts; 
        });

        document.getElementById('subjects-manage-list').innerHTML = APP.subs.map(s => `
            <div class="badge bg-primary p-2 m-1">
                <span onclick="editSubName('${s}')" style="cursor:pointer">✏️ ${s}</span>
                <span class="ms-2 text-danger" onclick="delSub('${s}')" style="cursor:pointer">❌</span>
            </div>`).join("");

        syncUnits(); 
        renderAdminItems(); 
        renderUnitManager(); 
        renderCodesAdmin();
        if(window.stuSub) renderStudent();
    }

    async function addSubject() {
        const name = document.getElementById('new-sub-name').value.trim();
        if(!name) return alert("اكتب اسم المادة الأول");
        const newList = [...(APP.subs || []), name];
        const newUnits = {...(APP.units || {})}; 
        if(!newUnits[name]) newUnits[name] = ["عام"];
        await db.ref(PATH).update({ subjects: newList, units: newUnits });
        document.getElementById('new-sub-name').value = "";
    }

    async function editSubName(oldName) {
        const newName = prompt("تعديل اسم المادة:", oldName);
        if(!newName || newName.trim() === "" || newName === oldName) return;
        const name = newName.trim();
        const newSubs = APP.subs.map(s => s === oldName ? name : s);
        const newUnits = {...APP.units};
        newUnits[name] = newUnits[oldName]; delete newUnits[oldName];
        const newContent = (APP.content || []).map(i => {
            if(i.subject === oldName) i.subject = name;
            return i;
        });
        await db.ref(PATH).update({ subjects: newSubs, units: newUnits, content: newContent });
    }

    async function delSub(s) {
        if(!confirm(`⚠️ هل أنت متأكد من حذف مادة (${s}) وكل محتواها؟`)) return;
        const newSubs = APP.subs.filter(x => x !== s);
        const newUnits = {...APP.units}; delete newUnits[s];
        const newContent = (APP.content || []).filter(i => i.subject !== s);
        await db.ref(PATH).update({ subjects: newSubs, units: newUnits, content: newContent });
    }

    async function addUnit() {
        const s = document.getElementById('sub-picker').value;
        const u = document.getElementById('new-u-name').value.trim();
        if(!u) return;
        const newList = [...(APP.units[s] || []), u];
        await db.ref(PATH + '/units/' + s).set(newList);
        document.getElementById('new-u-name').value = "";
    }

    function renderUnitManager() {
        const s = document.getElementById('sub-picker').value;
        if(!s) return;
        document.getElementById('unit-manager-list').innerHTML = (APP.units[s] || []).map(u => `
            <span class="badge bg-dark border p-2 m-1">
                ${u} <span class="text-danger ms-2" style="cursor:pointer" onclick="delUnit('${s}', '${u}')">×</span>
            </span>`).join("");
    }

    async function delUnit(s, u) {
        if(!confirm(`حذف قسم (${u})؟`)) return;
        const newList = APP.units[s].filter(x => x !== u);
        await db.ref(PATH + '/units/' + s).set(newList);
    }

    function previewContent() {
        const text = document.getElementById('data-input').value;
        const link = document.getElementById('l-url').value;
        const title = document.getElementById('l-title').value || "فتح";
        const area = document.getElementById('preview-area');
        if(!text) return alert("اكتب شيئاً للمعاينة");
        area.style.display = 'block';
        document.getElementById('preview-content').innerHTML = `<div class="gedar-card"><div>${text}</div>${link ? `<button class="btn-gedar mt-2">${title}</button>` : ''}</div>`;
    }

    async function publishContent() {
        const text = document.getElementById('data-input').value;
        if(!text) return alert("برجاء كتابة المحتوى أولاً");
        const item = {
            id: Date.now(), 
            text, 
            link: document.getElementById('l-url').value, 
            linkTitle: document.getElementById('l-title').value || "فتح",
            type: document.getElementById('t-list').value,
            unit: document.getElementById('u-list').value,
            subject: document.getElementById('sub-list').value,
            date: new Date().toLocaleString('ar-EG', { hour12: true })
        };
        const newList = [...(APP.content || []), item];
        await db.ref(PATH + '/content').set(newList);
        document.getElementById('data-input').value = "";
        document.getElementById('l-url').value = "";
        document.getElementById('preview-area').style.display = 'none';
        alert("✅ تم النشر!");
    }

    function renderAdminItems() {
        const listDiv = document.getElementById('admin-items-list');
        const tabsDiv = document.getElementById('admin-sub-tabs');
        if (!listDiv || !tabsDiv) return;

        const subTabs = (APP.subs || []).map(s => `
            <button class="nav-btn btn-xs ${window.adminSelSub === s ? 'active' : ''}" 
                    style="font-size: 11px; padding: 4px 10px; white-space: nowrap;"
                    onclick="window.adminSelSub='${s}'; renderAdminItems()">${s}</button>
        `).join("");
        tabsDiv.innerHTML = subTabs || "<span class='small text-secondary'>لا توجد مواد</span>";

        if(!window.adminSelSub && APP.subs && APP.subs.length > 0) window.adminSelSub = APP.subs[0];
        
        let filtered = (APP.content || []).filter(c => c.subject === window.adminSelSub);

        if (window.sortDesc) {
            filtered.sort((a, b) => b.id - a.id);
            if(document.getElementById('sort-icon')) document.getElementById('sort-icon').innerText = "🔽 الأحدث أولاً";
        } else {
            filtered.sort((a, b) => a.id - b.id);
            if(document.getElementById('sort-icon')) document.getElementById('sort-icon').innerText = "🔼 الأقدم أولاً";
        }

        listDiv.innerHTML = filtered.map((c) => {
            const originalIdx = APP.content.findIndex(item => item.id === c.id);
            return `
                <div class="item-accordion" style="border-bottom: 1px solid #2c3b4a; margin-bottom: 5px;">
                    <div class="item-accordion-header" style="cursor:pointer; padding: 8px;" onclick="this.nextElementSibling.style.display=(this.nextElementSibling.style.display==='block'?'none':'block')">
                        <div class="d-flex justify-content-between align-items-center w-100">
                            <div class="small">
                                <span class="text-warning fw-bold">[${c.unit}]</span> 
                                <span class="text-secondary" style="font-size:10px; margin-right:10px;">📅 ${c.date || '---'}</span>
                            </div>
                            <span style="font-size:10px;">▼</span>
                        </div>
                    </div>
                    <div class="item-accordion-body" style="display:none; padding: 10px; background: #111a24; border-radius: 8px; margin-top: 5px;">
                        <p class="small" style="white-space: pre-wrap; color: #ddd; font-size: 13px;">${c.text}</p>
                        <div class="d-flex justify-content-between align-items-center mt-2">
                             <span class="badge bg-dark border border-secondary" style="font-size:10px">${c.type}</span>
                             <button class="btn btn-xs btn-danger" style="font-size:10px; padding: 2px 8px;" onclick="delItem(${originalIdx})">🗑️ حذف نهائي</button>
                        </div>
                    </div>
                </div>`;
        }).join("") || "<div class='text-center p-4 small text-secondary'>لا يوجد محتوى لهذه المادة</div>";
    }

    async function delItem(idx) {
        if(!confirm('حذف هذا العنصر؟')) return;
        let newList = [...APP.content]; newList.splice(idx, 1);
        await db.ref(PATH + '/content').set(newList);
    }

    function generateCodes() {
        const num = document.getElementById('c-num').value;
        const sub = document.getElementById('code-sub-picker').value;
        if(!num || num < 1) return alert("حدد عدد الأكواد");
        const nc = {};
        for(let i=0; i<num; i++) {
            let id = Math.random().toString(36).substring(2,8).toUpperCase();
            nc[id] = { used: false, subject: sub, dev: "" };
        }
        db.ref(PATH + '/codes').update(nc);
    }

    function renderCodesAdmin() {
        const codes = Object.entries(APP.codes || {});
        document.getElementById('code-stats').innerHTML = `<div class="col-6">إجمالي: ${codes.length}</div><div class="col-6">مستخدم: ${codes.filter(x=>x[1].used).length}</div>`;
        document.getElementById('codes-tbody').innerHTML = codes.reverse().slice(0, 50).map(([id, c]) => `
            <tr>
                <td class="text-warning fw-bold">${id}</td>
                <td><button class="btn btn-xs btn-outline-warning" onclick="copyText('${id}')">نسخ</button></td>
                <td>${c.subject || 'عام'}</td>
                <td style="font-size:10px; color:#c5a059">${c.lastLogin || '---'}</td> 
                <td style="font-size:10px">${c.dev ? '📱 مقفل' : '🔓 حر'}</td>
                <td>
                    <div class="d-flex gap-1">
                        <button title="تصفير" class="btn btn-xs btn-info" onclick="db.ref('${PATH}/codes/${id}').update({used:false, dev:'', lastLogin:''})">🔄</button>
                        <button title="حذف نهائي" class="btn btn-xs btn-danger" onclick="deleteCode('${id}')">🗑️</button>
                    </div>
                </td>
            </tr>`).join("");
    }

    function handleLogin() {
        const p = document.getElementById('pass-field').value.trim();
        if(!p) return;
        if(p === APP.pass) { toggleView('admin-ui'); document.getElementById('to-admin-btn').style.display='block'; return; }
        const c = APP.codes[p];
        if(c) {
            const devId = (navigator.userAgent.match(/Android|iPhone|Windows/i) || ["Device"])[0] + " | " + screen.width;
            if(c.used && c.dev !== devId) return alert("⚠️ الكود يعمل على جهاز آخر!");
            const loginTime = new Date().toLocaleString('ar-EG');
            window.stuSub = c.subject;
            document.getElementById('stu-sub-name').innerText = window.stuSub;
            toggleView('student-ui');
            renderStudent();
            db.ref(PATH + '/codes/' + p).update({used:true, dev:devId, lastLogin: loginTime});
        } else { alert("كود خطأ!"); }
    }

    function toggleView(id) { ['login-ui','admin-ui','student-ui'].forEach(x => document.getElementById(x).style.display='none'); document.getElementById(id).style.display='block'; }
    function showAdminSec(s, btn) { document.querySelectorAll('.admin-sec').forEach(x => x.classList.remove('active')); document.getElementById('sec-'+s).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
    function syncUnits() { const s = document.getElementById('sub-list').value; document.getElementById('u-list').innerHTML = (APP.units[s] || ["عام"]).map(x => `<option value="${x}">${x}</option>`).join(""); }
    function setStuTab(t, b) { window.selT = t; document.querySelectorAll('#stu-tabs .nav-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); renderStudent(); }

    function renderStudent() {
        const t = window.selT || 'vid'; const units = APP.units[window.stuSub] || ["عام"]; const u = window.selU || units[0];
        document.getElementById('stu-u-nav').innerHTML = units.map(un => `<button class="btn btn-sm ${un===u?'btn-warning':'btn-outline-secondary'}" onclick="window.selU='${un}';renderStudent()">${un}</button>`).join("");
        const items = (APP.content || []).filter(i => i.subject === window.stuSub && i.unit === u && i.type === t);
        document.getElementById('stu-main').innerHTML = items.map(i => `<div class="gedar-card"><div>${i.text}</div>${i.link ? `<button class="btn-gedar mt-2" onclick="openLink('${i.link}','${i.type}')">${i.linkTitle}</button>` : ''}</div>`).join("") || "لا يوجد محتوى";
    }

    function openLink(url, type) { if(type === 'exams') { document.getElementById('exam-frame').src = url; document.getElementById('exam-container').style.display='block'; } else { window.open(url, '_blank'); } }
    function closeExam() { document.getElementById('exam-container').style.display='none'; document.getElementById('exam-frame').src = ''; }
    function copyText(t) { navigator.clipboard.writeText(t).then(() => alert("تم النسخ")); }
    async function doPaste(id) { try { const t = await navigator.clipboard.readText(); if(t) document.getElementById(id).value = t.trim(); } catch(e){} }

    async function updateAdminPass() {
        const newPass = document.getElementById('new-admin-pass').value.trim();
        if(!newPass) return alert("برجاء كتابة الباسورد الجديد أولاً");
        if(confirm("هل أنت متأكد من تغيير باسورد لوحة الإدارة؟")) {
            try {
                await db.ref(PATH).update({ adminPass: newPass });
                APP.pass = newPass;
                alert("✅ تم تغيير الباسورد بنجاح!");
                document.getElementById('new-admin-pass').value = "";
            } catch (e) { alert("حدث خطأ: " + e.message); }
        }
    }

    async function deleteCode(id) {
        if(confirm(`هل تريد حذف الكود ${id} نهائياً؟`)) {
            try { await db.ref(PATH + '/codes/' + id).remove(); } 
            catch (e) { alert("فشل الحذف: " + e.message); }
        }
    }

    async function clearUsedCodes() {
        const codes = APP.codes || {};
        const usedIds = Object.keys(codes).filter(id => codes[id].used);
        if (usedIds.length === 0) return alert("لا توجد أكواد مستخدمة حالياً.");
        if (confirm(`هل تريد حذف جميع الأكواد المستخدمة (${usedIds.length} كود)؟`)) {
            for (let id of usedIds) {
                await db.ref(PATH + '/codes/' + id).remove();
            }
            alert("✅ تم تنظيف الجدول بنجاح!");
        }
    }
</script>
</body>
</html>
